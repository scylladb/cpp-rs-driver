name: Build CPack Packages

on:
  workflow_call:
    inputs:
      build-type:
        description: CMake build type used for packaging
        type: string
        default: Release
      extra-cmake-flags:
        description: Additional flags passed to CMake configure step
        type: string
        default: ""
      save-artifacts:
        description: Save built packages as artifacts
        type: boolean
        default: false
    secrets: {}
  workflow_dispatch:
    inputs:
      build-type:
        description: CMake build type used for packaging
        type: string
        default: Release
      extra-cmake-flags:
        description: Additional flags passed to CMake configure step
        type: string
        default: ""
      save-artifacts:
        description: Save built packages as artifacts
        type: boolean
        default: false
    secrets: {}

env:
  CARGO_TERM_COLOR: always
  CMAKE_BUILD_TYPE: ${{ inputs.build-type }}
  CMAKE_FLAGS: ${{ inputs.extra-cmake-flags }}

jobs:
  linux-deb:
    name: Linux DEB packages
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build and test DEB packages
        run: make test-package-deb SCYLLA_SMOKE_BUILD_STATIC=ON

      - name: Verify static linking builds (regression test for issue #164)
        run: |
          sudo apt-get update -y
          make install-build-dependencies
          make build-static-integration-test-bin
          rm -rf build-static

      - name: Collect artifacts
        if: inputs.save-artifacts
        run: make collect-package-artifacts

      - uses: actions/upload-artifact@v4
        if: inputs.save-artifacts
        with:
          name: linux-deb-packages
          path: artifacts/linux
          retention-days: 7

  linux-rpm:
    name: Linux RPM packages
    runs-on: ubuntu-24.04
    container:
      image: fedora:latest
    services:
      scylla:
        image: scylladb/scylla
        ports:
          - 9042:9042
        options: >-
          --health-cmd "cqlsh scylla -e \"select * from system.local WHERE key='local'\""
          --health-interval 5s
          --health-timeout 5s
          --health-retries 60
    steps:
      - name: Install dependencies
        run: dnf -y install git make cmake gcc-c++ findutils rpm-build ninja-build pkgconf-pkg-config openssl-devel zlib-devel clang

      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build and test RPM packages
        run: make test-package-rpm-native SCYLLA_HOST=scylla SKIP_DOCKER_COMPOSE=1 SCYLLA_SMOKE_BUILD_STATIC=ON

      - name: Collect artifacts
        if: inputs.save-artifacts
        run: make collect-package-artifacts

      - uses: actions/upload-artifact@v4
        if: inputs.save-artifacts
        with:
          name: linux-rpm-packages
          path: artifacts/linux
          retention-days: 7

  macos:
    name: macOS packages
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install GNU make
        run: brew install make

      - name: Build and test macOS packages (PKG + DMG)
        run: gmake test-package-macos SCYLLA_SMOKE_BUILD_STATIC=ON

      - name: Verify static linking builds (regression test for issue #164)
        run: |
          gmake build-static-integration-test-bin
          rm -rf build-static

      - name: Collect artifacts
        if: inputs.save-artifacts
        run: gmake collect-package-artifacts

      - uses: actions/upload-artifact@v4
        if: inputs.save-artifacts
        with:
          name: macos-packages
          path: artifacts/macos
          retention-days: 7

  windows:
    name: Windows packages
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build and test Windows packages (MSI)
        run: make test-package-windows SCYLLA_SMOKE_BUILD_STATIC=ON

      - name: Verify static linking builds (regression test for issue #164)
        run: |
          make build-static-integration-test-bin
          if (Test-Path 'build-static') { Remove-Item -Recurse -Force 'build-static' }
        shell: pwsh

      - name: Collect artifacts
        if: inputs.save-artifacts
        run: make collect-package-artifacts

      - uses: actions/upload-artifact@v4
        if: inputs.save-artifacts
        with:
          name: windows-packages
          path: artifacts/windows
          retention-days: 7
